<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spicy Tunes - Music Player Widget">
  <title>Spicy Tunes 🎵</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fs-xs: 10px;
      --fs-sm: 11px;
      --fs-base: 12px;
      --fs-md: 13px;
      --fs-lg: 15px;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: #fff5f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
    }
    .st-wrapper {
      width: 100%;
      max-width: 350px;
      background: #fff5f0;
      border-radius: 18px;
      padding: 12px;
    }
    .sec-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #c73520;
      margin-bottom: 8px;
    }
    .sec-label .dot {
      width: 12px;
      height: 10px;
      border-radius: 50%;
      background: #d93020;
      flex-shrink: 0;
    }
    .music-card {
      background: #fff;
      border-radius: 18px;
      border: 2px solid #f5c5b8;
      padding: 14px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 0 #e8aa98;
    }
    .now-playing-banner {
      background: linear-gradient(135deg, #d93020 0%, #e85535 55%, #ef6640 100%);
      border-radius: 14px;
      padding: 11px 13px;
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 11px;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 0 #8c1a10;
    }
    .now-playing-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-55deg, transparent, transparent 12px, rgba(255,255,255,0.05) 12px, rgba(255,255,255,0.05) 24px);
      pointer-events: none;
    }
    .disc-wrap {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2.5px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      font-size: 18px;
    }
    .disc-wrap.spinning {
      animation: spinDisc 3.5s linear infinite;
    }
    @keyframes spinDisc {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .track-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    .track-label {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 1.25px;
      margin-bottom: 3px;
    }
    .track-name {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .eq-bar {
      width: 4px;
      border-radius: 2px 2px 0 0;
      background: rgba(255,255,255,0.75);
      animation: eqBounce 0.8s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 14px; animation-delay: .15s; }
    .eq-bar:nth-child(3) { height: 9px; animation-delay: .3s; }
    .eq-bar.paused { animation-play-state: paused; }
    @keyframes eqBounce { to { height: 18px; } }

    .playlist-section { margin-top: 10px; }
    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .playlist-title {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: #c73520;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .playlist-count {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: #d93020;
      background: #fff8f5;
      padding: 2px 8px;
      border-radius: 999px;
      border: 2px solid #f5c5b8;
    }
    .playlist-container {
      background: #fff8f5;
      border-radius: 14px;
      border: 2px solid #f5c5b8;
      max-height: 180px;
      overflow-y: auto;
    }
    .playlist-container::-webkit-scrollbar { width: 5px; }
    .playlist-container::-webkit-scrollbar-thumb { background: #d93020; border-radius: 3px; }
    .playlist-container::-webkit-scrollbar-track { background: #fce8e0; border-radius: 3px; }
    .playlist-container { scrollbar-width: thin; scrollbar-color: #d93020 #fce8e0; }
    .music-playlist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: var(--fs-sm);
      font-weight: 700;
      color: #8c1a10;
      border-bottom: 1px solid #fce8e0;
      transition: background .12s;
    }
    .music-playlist-item:last-child { border-bottom: none; }
    .music-playlist-item:hover { background: #fce8e0; }
    .music-playlist-item.active { background: #fce8e0; border-left: 3px solid #d93020; }
    .music-pl-num {
      font-size: 9px;
      font-weight: 900;
      color: #e8aa98;
      width: 16px;
      flex-shrink: 0;
    }
    .music-pl-icon {
      font-size: 10px;
      color: #d93020;
      width: 14px;
      flex-shrink: 0;
    }
    .music-pl-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-playlist-empty {
      text-align: center;
      padding: 20px 10px;
      font-size: var(--fs-sm);
      font-weight: 700;
      color: #e8aa98;
    }
    .music-playlist-empty span { display: block; font-size: 24px; margin-bottom: 6px; }

    .player-container {
      display: none;
      margin-bottom: 11px;
    }
    .player-container.active {
      display: block;
    }
    .player-container iframe {
      width: 100%;
      height: 0;
      border: none;
      border-radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .st-wrapper { background: #252525; }
      .music-card { background: #2d2d2d; border-color: #4a4a4a; }
      .sec-label { color: #ff8a80; }
      .playlist-container { background: #2d2d2d; border-color: #4a4a4a; }
      .music-playlist-item { color: #ff8a80; border-color: #3d3d3d; }
      .music-playlist-item:hover { background: #3d3d3d; }
      .playlist-count { background: #2d2d2d; border-color: #4a4a4a; color: #e8553a; }
    }

    @media (prefers-reduced-motion: reduce) {
      .disc-wrap, .eq-bar { animation: none; }
    }
  </style>
</head>
<body>
  <div class="st-wrapper">
    <div class="sec-label">
      <div class="dot"></div>
      <span>Spicy Tunes 🎵</span>
    </div>
    <div class="music-card">
      <div class="now-playing-banner">
        <div class="disc-wrap" id="disc">🎵</div>
        <div class="track-info">
          <div class="track-label">NOW PLAYING</div>
          <div class="track-name" id="trackName">Pick a song below ↓</div>
        </div>
        <div class="eq-bars" id="eqBars">
          <div class="eq-bar paused"></div>
          <div class="eq-bar paused"></div>
          <div class="eq-bar paused"></div>
        </div>
      </div>

      <div class="player-container" id="playerContainer">
        <iframe id="youtubePlayer" 
                src="" 
                allow="autoplay; encrypted-media" 
                allowfullscreen></iframe>
      </div>

      <div class="playlist-section">
        <div class="playlist-header">
          <span class="playlist-title">ALL SONGS</span>
          <span class="playlist-count" id="plCount">0</span>
        </div>
        <div class="playlist-container" id="playlist">
          <div class="music-playlist-empty"><span>🎵</span>No songs yet!<br>Click to play</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const DB = [
        { title: 'Montagem Unknown', videoId: 'gvGQ27rWmg0' },
        { title: 'Montagem Tomada', videoId: 'EYaP4h6njtI' },
        { title: 'No Batidao', videoId: 'Bf2ml3oE2JA' },
        { title: 'Montagem Xonada', videoId: 'JjPtDl6EJ3o' },
        { title: 'Montagem Rugada', videoId: 'Hd5nXTyaXZg' },
        { title: 'Montagem Batchi', videoId: 'XuWGCvITF20' }
      ];

      let currentVideoId = null;

      const disc = document.getElementById('disc');
      const trackName = document.getElementById('trackName');
      const eqBars = document.getElementById('eqBars');
      const playlist = document.getElementById('playlist');
      const plCount = document.getElementById('plCount');
      const playerContainer = document.getElementById('playerContainer');
      const iframe = document.getElementById('youtubePlayer');

      function setPlayingUI(playing) {
        if (playing) {
          disc.classList.add('spinning');
          eqBars.querySelectorAll('.eq-bar').forEach(b => b.classList.remove('paused'));
        } else {
          disc.classList.remove('spinning');
          eqBars.querySelectorAll('.eq-bar').forEach(b => b.classList.add('paused'));
        }
      }

      function playVideo(videoId, title) {
        currentVideoId = videoId;
        trackName.textContent = title;
        
        iframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0';
        playerContainer.classList.add('active');
        
        setPlayingUI(true);
        renderPlaylist();
      }

      function stopVideo() {
        iframe.src = '';
        playerContainer.classList.remove('active');
        trackName.textContent = 'Pick a song below ↓';
        setPlayingUI(false);
        currentVideoId = null;
      }

      function renderPlaylist() {
        plCount.textContent = DB.length;
        playlist.innerHTML = '';
        
        DB.forEach((song, i) => {
          const div = document.createElement('div');
          const isActive = song.videoId === currentVideoId;
          div.className = 'music-playlist-item' + (isActive ? ' active' : '');
          div.innerHTML =
            '<span class="music-pl-num">' + String(i + 1).padStart(2, '0') + '</span>' +
            '<span class="music-pl-icon">' + (isActive ? '▶' : '♪') + '</span>' +
            '<span class="music-pl-name">' + song.title + '</span>';
          div.onclick = () => {
            if (isActive) {
              stopVideo();
            } else {
              playVideo(song.videoId, song.title);
            }
          };
          playlist.appendChild(div);
        });
      }

      renderPlaylist();
    })();
  </script>
</body>
</html>
