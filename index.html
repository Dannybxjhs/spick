<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spicy Tunes - Music Player Widget">
  <title>Spicy Tunes 🎵</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fs-xs: 10px;
      --fs-sm: 11px;
      --fs-base: 12px;
      --fs-md: 13px;
      --fs-lg: 15px;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: #fff5f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
    }
    .st-wrapper {
      width: 100%;
      max-width: 350px;
      background: #fff5f0;
      border-radius: 18px;
      padding: 12px;
    }
    .sec-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #c73520;
      margin-bottom: 8px;
    }
    .sec-label .dot {
      width: 12px;
      height: 10px;
      border-radius: 50%;
      background: #d93020;
      flex-shrink: 0;
    }
    .music-card {
      background: #fff;
      border-radius: 18px;
      border: 2px solid #f5c5b8;
      padding: 14px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 0 #e8aa98;
    }
    .now-playing-banner {
      background: linear-gradient(135deg, #d93020 0%, #e85535 55%, #ef6640 100%);
      border-radius: 14px;
      padding: 11px 13px;
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 11px;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 0 #8c1a10;
    }
    .now-playing-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-55deg, transparent, transparent 12px, rgba(255,255,255,0.05) 12px, rgba(255,255,255,0.05) 24px);
      pointer-events: none;
    }
    .disc-wrap {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2.5px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      font-size: 18px;
    }
    .disc-wrap.spinning {
      animation: spinDisc 3.5s linear infinite;
    }
    @keyframes spinDisc {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .track-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    .track-label {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 1.25px;
      margin-bottom: 3px;
    }
    .track-name {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .eq-bar {
      width: 4px;
      border-radius: 2px 2px 0 0;
      background: rgba(255,255,255,0.75);
      animation: eqBounce 0.8s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 14px; animation-delay: .15s; }
    .eq-bar:nth-child(3) { height: 9px; animation-delay: .3s; }
    .eq-bar.paused { animation-play-state: paused; }
    @keyframes eqBounce { to { height: 18px; } }

    .music-progress-section { margin-bottom: 10px; }
    .music-progress-track {
      width: 100%;
      height: 9px;
      background: #fce8e0;
      border-radius: 999px;
      border: 2px solid #f5c5b8;
      cursor: pointer;
      position: relative;
      overflow: visible;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
    }
    .music-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #d93020, #e85535, #ef6640);
      border-radius: 999px;
      width: 0%;
      position: relative;
      transition: width .1s linear;
    }
    .music-progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(255,255,255,0.2) 8px, rgba(255,255,255,0.2) 14px);
      border-radius: 999px;
    }
    .music-progress-knob {
      position: absolute;
      right: -7px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #d93020;
      box-shadow: 0 3px 0 #8c1a10;
      cursor: pointer;
      z-index: 3;
      transition: transform .15s;
    }
    .music-progress-knob:hover { transform: translateY(-50%) scale(1.2); }
    .music-time-row {
      display: flex;
      justify-content: space-between;
      font-size: var(--fs-xs);
      font-weight: 900;
      color: #c73520;
      margin-top: 4px;
      padding: 0 2px;
    }

    .music-controls-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 11px;
      flex-wrap: nowrap;
    }
    .mcbtn {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #f5c5b8;
      background: #fff8f5;
      box-shadow: 0 4px 0 #e8aa98;
      transition: all .15s ease;
      user-select: none;
      flex-shrink: 0;
      pointer-events: auto;
    }
    .mcbtn svg, .mcbtn svg * { pointer-events: none; }
    .mcbtn:hover {
      background: #fce8e0;
      border-color: #d93020;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #c73520;
    }
    .mcbtn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #c73520;
    }
    .mcbtn svg { display: block; flex-shrink: 0; }
    .mcbtn.sm { width: 22px; height: 22px; }
    .mcbtn.sm svg { width: 11px; height: 11px; }
    .mcbtn.play {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #d93020, #e85535);
      border: none;
      box-shadow: 0 5px 0 #8c1a10;
    }
    .mcbtn.play svg { width: 12px; height: 12px; }
    .mcbtn.play:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #8c1a10;
      background: linear-gradient(135deg, #c02010, #d94030);
    }
    .mcbtn.play:active { transform: translateY(2px); box-shadow: 0 2px 0 #8c1a10; }
    .mcbtn.loop-on {
      background: linear-gradient(135deg, #d93020, #ef6640);
      border: none;
      box-shadow: 0 4px 0 #8c1a10;
    }
    .mcbtn.loop-on svg { color: #fff !important; }
    .mcbtn.loop-on:hover { background: linear-gradient(135deg, #c02010, #e85535); box-shadow: 0 6px 0 #8c1a10; }

    .music-vol-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .music-vol-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #f5c5b8;
      background: #fff8f5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 3px 0 #e8aa98;
      transition: all .15s;
      flex-shrink: 0;
    }
    .music-vol-icon:hover { background: #fce8e0; border-color: #d93020; transform: translateY(-1px); }
    .music-vol-icon svg { width: 13px; height: 13px; color: #c73520; pointer-events: none; }
    .music-vol-track {
      width: 46px;
      height: 8px;
      background: #fce8e0;
      border-radius: 999px;
      border: 2px solid #f5c5b8;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    .music-vol-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      border-radius: 999px;
      width: 70%;
    }
    .music-vol-knob {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: calc(70% - 6px);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 2.5px solid #7c3aed;
      cursor: pointer;
      z-index: 2;
      box-shadow: 0 2px 0 #5b21b6;
    }

    .playlist-section { margin-top: 10px; }
    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .playlist-title {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: #c73520;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .playlist-count {
      font-size: var(--fs-xs);
      font-weight: 900;
      color: #d93020;
      background: #fff8f5;
      padding: 2px 8px;
      border-radius: 999px;
      border: 2px solid #f5c5b8;
    }
    .playlist-container {
      background: #fff8f5;
      border-radius: 14px;
      border: 2px solid #f5c5b8;
      max-height: 180px;
      overflow-y: auto;
    }
    .playlist-container::-webkit-scrollbar { width: 5px; }
    .playlist-container::-webkit-scrollbar-thumb { background: #d93020; border-radius: 3px; }
    .playlist-container::-webkit-scrollbar-track { background: #fce8e0; border-radius: 3px; }
    .playlist-container { scrollbar-width: thin; scrollbar-color: #d93020 #fce8e0; }
    .music-playlist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: var(--fs-sm);
      font-weight: 700;
      color: #8c1a10;
      border-bottom: 1px solid #fce8e0;
      transition: background .12s;
    }
    .music-playlist-item:last-child { border-bottom: none; }
    .music-playlist-item:hover { background: #fce8e0; }
    .music-playlist-item.active { background: #fce8e0; }
    .music-pl-num {
      font-size: 9px;
      font-weight: 900;
      color: #e8aa98;
      width: 16px;
      flex-shrink: 0;
    }
    .music-pl-icon {
      font-size: 10px;
      color: #d93020;
      width: 14px;
      flex-shrink: 0;
    }
    .music-pl-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-pl-remove {
      font-size: 10px;
      color: #e8aa98;
      padding: 4px;
      cursor: pointer;
      transition: color .12s;
    }
    .music-pl-remove:hover { color: #d93020; }
    .music-playlist-empty {
      text-align: center;
      padding: 20px 10px;
      font-size: var(--fs-sm);
      font-weight: 700;
      color: #e8aa98;
    }
    .music-playlist-empty span { display: block; font-size: 24px; margin-bottom: 6px; }

    .youtube-player {
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      pointer-events: none;
      opacity: 0;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .st-wrapper { background: #252525; }
      .music-card { background: #2d2d2d; border-color: #4a4a4a; }
      .sec-label { color: #ff8a80; }
      .music-progress-track { background: #3d3d3d; border-color: #4a4a4a; }
      .music-time-row { color: #ff8a80; }
      .mcbtn { background: #2d2d2d; border-color: #4a4a4a; box-shadow: 0 4px 0 #3d3d3d; }
      .mcbtn:hover { background: #3d3d3d; border-color: #e8553a; box-shadow: 0 6px 0 #e8553a; }
      .music-vol-icon { background: #2d2d2d; border-color: #4a4a4a; box-shadow: 0 3px 0 #3d3d3d; }
      .music-vol-track { background: #3d3d3d; border-color: #4a4a4a; }
      .playlist-container { background: #2d2d2d; border-color: #4a4a4a; }
      .music-playlist-item { color: #ff8a80; border-color: #3d3d3d; }
      .music-playlist-item:hover { background: #3d3d3d; }
      .playlist-count { background: #2d2d2d; border-color: #4a4a4a; color: #e8553a; }
    }

    @media (prefers-reduced-motion: reduce) {
      .disc-wrap, .eq-bar { animation: none; }
      .mcbtn, .music-vol-icon { transition: none; }
    }
  </style>
</head>
<body>
  <div class="st-wrapper">
    <div class="sec-label">
      <div class="dot"></div>
      <span>Spicy Tunes 🎵</span>
    </div>
    <div class="music-card">
      <div class="now-playing-banner">
        <div class="disc-wrap" id="disc">🎵</div>
        <div class="track-info">
          <div class="track-label">NOW PLAYING</div>
          <div class="track-name" id="trackName">Pick a song below ↓</div>
        </div>
        <div class="eq-bars" id="eqBars">
          <div class="eq-bar paused"></div>
          <div class="eq-bar paused"></div>
          <div class="eq-bar paused"></div>
        </div>
      </div>

      <div class="music-progress-section">
        <div class="music-progress-track" id="progressTrack">
          <div class="music-progress-fill" id="progressFill"></div>
          <div class="music-progress-knob" id="progressKnob"></div>
        </div>
        <div class="music-time-row">
          <span id="timeCur">0:00</span>
          <span id="timeDur">0:00</span>
        </div>
      </div>

      <div class="music-controls-row">
        <button class="mcbtn sm" id="btnPrev" title="Previous">
          <svg viewBox="0 0 24 24" fill="none" stroke="#c73520" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
        </button>
        <button class="mcbtn play" id="btnPlay" title="Play">
          <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="mcbtn sm" id="btnNext" title="Next">
          <svg viewBox="0 0 24 24" fill="none" stroke="#c73520" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>
        <button class="mcbtn sm" id="btnLoop" title="Loop OFF">
          <svg id="iconLoop" viewBox="0 0 24 24" fill="none" stroke="#c73520" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"></polyline>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <polyline points="7 23 3 19 7 15"></polyline>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
        </button>
        <div class="music-vol-row">
          <div class="music-vol-icon" id="btnVol" title="Mute">
            <svg id="iconVol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          </div>
          <div class="music-vol-track" id="volTrack">
            <div class="music-vol-fill" id="volFill"></div>
            <div class="music-vol-knob" id="volKnob"></div>
          </div>
        </div>
      </div>

      <div class="playlist-section">
        <div class="playlist-header">
          <span class="playlist-title">QUEUE</span>
          <span class="playlist-count" id="plCount">0</span>
        </div>
        <div class="playlist-container" id="playlist">
          <div class="music-playlist-empty"><span>🎵</span>No songs yet!<br>Click to add</div>
        </div>
      </div>
    </div>
  </div>

  <div id="youtubePlayer" class="youtube-player"></div>

  <script>
    (function() {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      let player;
      let isReady = false;
      let isPlaying = false;
      let loopOn = false;
      let currentVideoId = null;

      const DB = [
         { title: 'Montagem Unknown', videoId: 'gvGQ27rWmg0' },
  { title: 'Montagem Tomada', videoId: 'EYaP4h6njtI' },
  { title: 'No Batidao', videoId: 'Bf2ml3oE2JA' },
  { title: 'Montagem Xonada', videoId: 'JjPtDl6EJ3o' },
  { title: 'Montagem Rugada', videoId: 'Hd5nXTyaXZg' },
  { title: 'Montagem Batchi', videoId: 'XuWGCvITF20' }
      ];

      const queue = [];
      let cur = 0;

      const disc = document.getElementById('disc');
      const trackName = document.getElementById('trackName');
      const eqBars = document.getElementById('eqBars');
      const progTrack = document.getElementById('progressTrack');
      const progFill = document.getElementById('progressFill');
      const progKnob = document.getElementById('progressKnob');
      const timeCur = document.getElementById('timeCur');
      const timeDur = document.getElementById('timeDur');
      const btnPlay = document.getElementById('btnPlay');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      const btnLoop = document.getElementById('btnLoop');
      const btnVol = document.getElementById('btnVol');
      const iconVol = document.getElementById('iconVol');
      const volTrack = document.getElementById('volTrack');
      const volFill = document.getElementById('volFill');
      const volKnob = document.getElementById('volKnob');
      const iconPlay = document.getElementById('iconPlay');
      const iconLoop = document.getElementById('iconLoop');
      const playlist = document.getElementById('playlist');
      const plCount = document.getElementById('plCount');

      window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('youtubePlayer', {
          height: '1',
          width: '1',
          playerVars: {
            'autoplay': 0,
            'controls': 0,
            'disablekb': 1,
            'fs': 0,
            'modestbranding': 1,
            'rel': 0,
            'showinfo': 0
          },
          events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
          }
        });
      };

      function onPlayerReady(event) {
        isReady = true;
        player.setVolume(70);
        setVolUI();
      }

      function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
          isPlaying = true;
          setPlayingUI(true);
          startProgressUpdate();
        } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
          isPlaying = false;
          setPlayingUI(false);
          if (event.data === YT.PlayerState.ENDED && !loopOn) {
            nextTrack(true);
          }
        }
      }

      let progressInterval;

      function startProgressUpdate() {
        clearInterval(progressInterval);
        progressInterval = setInterval(updateProgress, 500);
      }

      function updateProgress() {
        if (!player || !player.getCurrentTime || !player.getDuration) return;
        const currentTime = player.getCurrentTime();
        const duration = player.getDuration();
        if (!duration || isNaN(duration)) return;
        const pct = (currentTime / duration) * 100;
        progFill.style.width = pct + '%';
        timeCur.textContent = fmt(currentTime);
        timeDur.textContent = fmt(duration);
      }

      function fmt(s) {
        if (!s || isNaN(s)) return '0:00';
        const m = Math.floor(s / 60), sc = Math.floor(s % 60);
        return m + ':' + (sc < 10 ? '0' : '') + sc;
      }

      function setPlayingUI(playing) {
        if (playing) {
          iconPlay.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
          iconPlay.setAttribute('fill', 'white');
          disc.classList.add('spinning');
          eqBars.querySelectorAll('.eq-bar').forEach(b => b.classList.remove('paused'));
          btnPlay.title = 'Pause';
        } else {
          iconPlay.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
          iconPlay.setAttribute('fill', 'white');
          disc.classList.remove('spinning');
          eqBars.querySelectorAll('.eq-bar').forEach(b => b.classList.add('paused'));
          btnPlay.title = 'Play';
        }
        renderPlaylist();
      }

      function setLoopUI(on) {
        loopOn = on;
        if (on) {
          btnLoop.classList.add('loop-on');
          iconLoop.setAttribute('stroke', '#fff');
          btnLoop.title = 'Loop ON';
        } else {
          btnLoop.classList.remove('loop-on');
          iconLoop.setAttribute('stroke', '#c73520');
          btnLoop.title = 'Loop OFF';
        }
      }

      function setVolUI() {
        if (!player || !player.getVolume) return;
        const v = player.isMuted() ? 0 : player.getVolume();
        const pct = v + '%';
        volFill.style.width = pct;
        volKnob.style.left = 'calc(' + pct + ' - 6px)';
        const muted = player.isMuted() || v === 0;
        iconVol.innerHTML = muted
          ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
          : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
        btnVol.title = muted ? 'Unmute' : 'Mute';
      }

      function loadTrack(index, autoplay) {
        if (!queue.length) return;
        cur = index;
        const videoId = queue[cur].videoId;
        currentVideoId = videoId;
        trackName.textContent = queue[cur].title;
        progFill.style.width = '0%';
        timeCur.textContent = '0:00';
        timeDur.textContent = '0:00';
        renderPlaylist();
        if (isReady && player && player.loadVideoById) {
          player.loadVideoById(videoId);
          if (autoplay) {
            setTimeout(() => {
              player.playVideo();
            }, 500);
          }
        }
      }

      function renderPlaylist() {
        plCount.textContent = queue.length;
        if (!queue.length) {
          playlist.innerHTML = '<div class="music-playlist-empty"><span>🎵</span>No songs yet!<br>Click to add</div>';
          return;
        }
        playlist.innerHTML = '';
        queue.forEach((t, i) => {
          const div = document.createElement('div');
          div.className = 'music-playlist-item' + (i === cur ? ' active' : '');
          const rowIcon = (i === cur && isPlaying) ? '▶' : '♪';
          div.innerHTML =
            '<span class="music-pl-num">' + String(i + 1).padStart(2, '0') + '</span>' +
            '<span class="music-pl-icon">' + rowIcon + '</span>' +
            '<span class="music-pl-name">' + t.title + '</span>' +
            '<span class="music-pl-remove" data-i="' + i + '">✕</span>';
          div.querySelector('.music-pl-name').onclick = () => { loadTrack(i, true); };
          div.querySelector('.music-pl-remove').onclick = (e) => { e.stopPropagation(); removeTrack(i); };
          playlist.appendChild(div);
        });
      }

      function removeTrack(i) {
        const wasPlaying = isPlaying && i === cur;
        queue.splice(i, 1);
        if (!queue.length) {
          player.stopVideo();
          cur = 0;
          trackName.textContent = 'Pick a song below ↓';
          progFill.style.width = '0%';
          timeCur.textContent = '0:00';
          timeDur.textContent = '0:00';
          setPlayingUI(false);
          renderPlaylist();
          return;
        }
        if (i < cur) cur--;
        if (i === cur) {
          if (cur >= queue.length) cur = queue.length - 1;
          loadTrack(cur, wasPlaying);
        }
        renderPlaylist();
      }

      function nextTrack(forcePlay) {
        if (!queue.length) return;
        const wp = (forcePlay === true) ? true : isPlaying;
        if (loopOn && queue.length === 1) {
          player.seekTo(0);
          player.playVideo();
        } else {
          cur = (cur + 1) % queue.length;
          loadTrack(cur, wp);
        }
      }

      function prevTrack() {
        if (!queue.length) return;
        if (player && player.getCurrentTime && player.getCurrentTime() > 3) {
          player.seekTo(0);
          return;
        }
        const wp = isPlaying;
        cur = (cur - 1 + queue.length) % queue.length;
        loadTrack(cur, wp);
      }

      btnPlay.onclick = () => {
        if (!queue.length) return;
        if (isPlaying) {
          player.pauseVideo();
        } else {
          player.playVideo();
        }
      };

      btnPrev.onclick = prevTrack;
      btnNext.onclick = () => nextTrack(true);
      btnLoop.onclick = () => setLoopUI(!loopOn);

      btnVol.onclick = () => {
        if (player.isMuted()) {
          player.unMute();
        } else {
          player.mute();
        }
        setVolUI();
      };

      volTrack.onclick = (e) => {
        const rect = volTrack.getBoundingClientRect();
        const pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        player.setVolume(pct);
        setVolUI();
      };

      volKnob.onmousedown = (e) => {
        e.preventDefault();
        const onMove = (e) => {
          const rect = volTrack.getBoundingClientRect();
          const pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
          player.setVolume(pct);
          setVolUI();
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      };

      progTrack.onclick = (e) => {
        if (!player || !player.getDuration) return;
        const rect = progTrack.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const duration = player.getDuration();
        if (duration && !isNaN(duration)) {
          player.seekTo(pct * duration);
          updateProgress();
        }
      };

      progKnob.onmousedown = (e) => {
        e.preventDefault();
        draggingProg = true;
        const onMove = (e) => {
          const rect = progTrack.getBoundingClientRect();
          const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
          progFill.style.width = (pct * 100) + '%';
        };
        const onUp = (e) => {
          draggingProg = false;
          const rect = progTrack.getBoundingClientRect();
          const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
          if (player && player.getDuration) {
            const duration = player.getDuration();
            if (duration && !isNaN(duration)) {
              player.seekTo(pct * duration);
              updateProgress();
            }
          }
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      };

      let draggingProg = false;

      function addSongToQueue(videoId, title) {
        if (queue.find(s => s.videoId === videoId)) return;
        queue.push({ title, videoId });
        renderPlaylist();
        if (queue.length === 1) {
          loadTrack(0, true);
        }
      }

      function renderDbList() {
        const container = document.createElement('div');
        container.style.cssText = 'margin-top:10px;';
        
        const header = document.createElement('div');
        header.className = 'playlist-header';
        header.innerHTML = '<span class="playlist-title">ALL SONGS</span>';
        container.appendChild(header);
        
        const list = document.createElement('div');
        list.className = 'playlist-container';
        list.style.maxHeight = '150px';
        
        DB.forEach((song, i) => {
          const item = document.createElement('div');
          item.className = 'music-playlist-item';
          item.innerHTML = '<span class="music-pl-num">' + String(i + 1).padStart(2, '0') + '</span><span class="music-pl-icon">+</span><span class="music-pl-name">' + song.title + '</span>';
          item.onclick = () => addSongToQueue(song.videoId, song.title);
          list.appendChild(item);
        });
        
        container.appendChild(list);
        return container;
      }

      const card = document.querySelector('.music-card');
      card.appendChild(renderDbList());

    })();
  </script>
</body>
</html>
